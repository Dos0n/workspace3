<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Presence Monitor Pro</title>
    <style>
        body { margin: 0; padding: 0; background: #0f172a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #gaze-dot {
            width: 10px; height: 10px; background: #22c55e; border-radius: 50%;
            position: fixed; pointer-events: none; z-index: 9999;
            box-shadow: 0 0 10px #22c55e; transition: transform 0.1s ease-out;
            opacity: 0;
        }

        #status-container {
            display: none; 
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        #status-box {
            padding: 20px 40px; border-radius: 12px;
            background: #1e293b; border: 2px solid #334155;
            text-align: center; min-width: 240px;
            transition: all 0.3s ease;
        }

        .label { font-size: 11px; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; letter-spacing: 1px; }
        #status-text { font-size: 22px; font-weight: bold; }

        #reward-ui { display: none; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; }
        #money-text { font-size: 26px; color: #fbbf24; font-weight: bold; margin-bottom: 4px; }
        #multiplier-tag { font-size: 13px; color: #94a3b8; font-weight: bold; }
        
        #streak-container { width: 100%; height: 8px; background: #334155; margin-top: 15px; border-radius: 4px; overflow: hidden; }
        #streak-bar { width: 0%; height: 100%; background: #3b82f6; transition: width 0.4s ease; }

        .calib-point {
            width: 34px; height: 34px; background: #ef4444; border-radius: 50%;
            position: absolute; cursor: pointer; border: 2px solid white;
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            font-weight: bold; font-size: 11px; user-select: none;
        }
        .pt1 { top: 10%; left: 10%; } .pt2 { top: 10%; left: 50%; } .pt3 { top: 10%; left: 90%; }
        .pt4 { top: 50%; left: 10%; } .pt5 { top: 50%; left: 50%; } .pt6 { top: 50%; left: 90%; }
        .pt7 { top: 90%; left: 10%; } .pt8 { top: 90%; left: 50%; } .pt9 { top: 90%; left: 90%; }

        #overlay {
            position: fixed; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }
        button {
            padding: 12px 30px; border: none; border-radius: 8px; background: #3b82f6;
            color: white; font-weight: bold; cursor: pointer; transition: background 0.2s;
        }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>

    <div id="gaze-dot"></div>

    <div id="overlay">
        <h2 style="margin-bottom: 10px;">Presence Tracker</h2>
        <p style="color: #94a3b8; margin-bottom: 20px;">Click each red dot 10 times while looking at it directly.</p>
        <button onclick="startCalibration()">Start Training</button>
    </div>

    <div id="calibration-group" style="display:none">
        <div class="calib-point pt1" data-clicks="0">10</div>
        <div class="calib-point pt2" data-clicks="0">10</div>
        <div class="calib-point pt3" data-clicks="0">10</div>
        <div class="calib-point pt4" data-clicks="0">10</div>
        <div class="calib-point pt5" data-clicks="0">10</div>
        <div class="calib-point pt6" data-clicks="0">10</div>
        <div class="calib-point pt7" data-clicks="0">10</div>
        <div class="calib-point pt8" data-clicks="0">10</div>
        <div class="calib-point pt9" data-clicks="0">10</div>
    </div>

    <div id="status-container">
        <div id="status-box">
            <div class="label">System Status</div>
            <div id="status-text">CALIBRATING</div>
            
            <div id="reward-ui">
                <div class="label">Wallet</div>
                <div id="money-text">$0.00</div>
                <div id="multiplier-tag">1.0x Multiplier</div>
                <div id="streak-container">
                    <div id="streak-bar"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/webgazer@2.1.1/dist/webgazer.js"></script>
    <script src="script.js"></script>
</body>
</html>
